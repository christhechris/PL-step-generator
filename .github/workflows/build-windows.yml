name: Build Windows App

# Builds the standalone Windows .exe with PyInstaller. Runs on version tags
# (e.g. v0.4.1) and on manual dispatch. On a tag it attaches the build to a
# GitHub Release; every run also uploads it as a downloadable workflow artifact.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # required to create/upload GitHub Release assets

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build with PyInstaller
        run: python -m PyInstaller --noconfirm --clean packaging/lantern_step.spec

      - name: Smoke-test the frozen app
        run: |
          $exe = "dist/LanternStep/LanternStep.exe"
          if (-not (Test-Path $exe)) { Write-Error "Built exe not found at $exe"; exit 1 }
          # Run the frozen app in self-test mode: it exercises the real frozen
          # import graph (the class of bug that previously crashed the app on
          # launch) plus the OCCT kernel, writes a result file, and exits without
          # opening a window. We poll for that file - a definitive pass signal
          # that does not depend on capturing a windowed app's exit code. If the
          # app crashed or hung on startup, no file appears and we fail.
          $out = Join-Path $PWD "selftest_result.txt"
          if (Test-Path $out) { Remove-Item $out }
          $env:LANTERN_STEP_SELFTEST = "1"
          $env:LANTERN_STEP_SELFTEST_OUT = $out
          $env:QT_QPA_PLATFORM = "offscreen"
          Write-Host "Running frozen-app self-test..."
          $p = Start-Process -FilePath $exe -PassThru
          $ok = $false
          for ($i = 0; $i -lt 120; $i++) {
            if (Test-Path $out) { $ok = $true; break }
            if ($p.HasExited) { break }
            Start-Sleep -Seconds 1
          }
          if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue }
          if (-not $ok) {
            Write-Error "Self-test produced no result file (frozen app crashed or hung on startup)."
            exit 1
          }
          $content = (Get-Content $out -Raw).Trim()
          if ($content -notmatch "LANTERN_STEP_SELFTEST OK") {
            Write-Error "Unexpected self-test result: $content"
            exit 1
          }
          Write-Host "Self-test passed: $content"

      - name: Package the app
        run: Compress-Archive -Path dist/LanternStep -DestinationPath LanternStep-windows.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanternStep-windows
          path: LanternStep-windows.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LanternStep-windows.zip
